name: Build OpenWrt IPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-app-chinesecalendar

jobs:
  build:
    name: Build IPK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev python3 python3-setuptools \
            unzip wget rsync zlib1g-dev

      - name: Download SDK
        run: |
          wget -q "https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz" -O /tmp/sdk.tar.xz
          cd /tmp
          tar xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Build package
        run: |
          cp -r "${{ github.workspace }}" "/tmp/sdk/package/${{ env.PACKAGE_NAME }}"
          cd /tmp/sdk
          # Update feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # Build
          make defconfig
          make package/${{ env.PACKAGE_NAME }}/compile V=s -j$(nproc)

      - name: Collect IPK
        run: |
          mkdir -p output
          find /tmp/sdk/bin/ -name "${{ env.PACKAGE_NAME }}*.ipk" -exec cp {} output/ \;
          ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: output/*.ipk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.ipk
          generate_release_notes: true
